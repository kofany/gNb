global: # Please do not play with global values if you are not sure what you are doing
  log_level: warning  # Logging level: debug, info, warning, error
  ison_interval: 1  # Interval in seconds between ISON requests
  nick_api:
    url: 'https://i.got.al/words.php'
    max_word_length: 12
    timeout: 5  # Timeout for API requests in seconds
  max_nick_length: 14
  owner_command_prefixes:
    - "!"
    - "."
    - "@"
  reconnect_retries: 3
  reconnect_interval: 2
  mass_command_cooldown: 5
  
bots:
  - server: ircnet.hostsailor.com #example server 
    port: 6667
    ssl: false
    vhost: 192.168.176.35 # example IPv4


channels:
  - "#tahion" #example channel

# Panel API (WebSocket). Plain HTTP by default — expose via cloudflared for wss://.
# Set api.enabled: true to turn on. Generate a fresh 64-char hex token with:
#   python -c 'import secrets; print(secrets.token_hex(32))'
api:
  enabled: false
  node_name: "my-node"
  bind_addr: "127.0.0.1:7766"
  auth_token: ""
  tls_cert_file: ""
  tls_key_file: ""
  event_buffer: 1000
  max_connections: 4
